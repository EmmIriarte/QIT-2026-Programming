<!DOCTYPE html>
<html lang="en">
<head>
    <title>LeetCode Showcase - Reverse Integer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; padding: 20px; color: #374151; max-width: 900px; margin: 0 auto; }
        .nav { margin-bottom: 20px; }
        .nav a { color: #3b82f6; text-decoration: none; font-weight: bold; }
        
        .card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 20px; }
        h1 { color: #111827; margin-top: 0; }
        .problem-desc { background: #f9fafb; padding: 15px; border-left: 4px solid #f59e0b; border-radius: 4px; margin-bottom: 20px; line-height: 1.5; }
        
        /* Code Editor Simulation */
        .code-window { background: #1e1e1e; color: #d4d4d4; border-radius: 8px; overflow: hidden; margin-bottom: 10px; font-family: 'Courier New', Courier, monospace; }
        .code-header { background: #333333; padding: 10px 15px; font-size: 0.85rem; color: #cccccc; display: flex; gap: 8px; align-items: center; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; }
        .code-body { padding: 20px; margin: 0; font-size: 0.95rem; white-space: pre-wrap; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/cesar/">← Back to Cesar's Section</a>
    </div>

    <div class="card">
        <h1>🧠 LeetCode #7: Reverse Integer</h1>
        
        <div class="problem-desc">
            <strong>Problem Statement:</strong><br>
            Given a signed 32-bit integer <code>x</code>, return <code>x</code> with its digits reversed. If reversing <code>x</code> causes the value to go outside the signed 32-bit integer range <code>[-2<sup>31</sup>, 2<sup>31</sup> - 1]</code>, then return <code>0</code>.
        </div>

        <div class="code-window">
            <div class="code-header">
                <span class="dot" style="background: #ff5f56;"></span>
                <span class="dot" style="background: #ffbd2e;"></span>
                <span class="dot" style="background: #27c93f;"></span>
                <span style="margin-left: 10px;">reverse_integer.py</span>
            </div>
            <pre class="code-body">{{ solution_code }}</pre>
        </div>
    </div>
</body>
</html>
